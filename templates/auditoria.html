{% extends "base.html" %}
{% block contenido %}

<h2>Auditoría</h2>

<table border="1">
<tr>
<th>Fecha</th>
<th>Admin</th>
<th>Acción</th>
<th>Usuario</th>
<th>Detalle</th>
</tr>

{% for r in registros %}
<tr>
<td>{{ r.fecha }}</td>
<td>{{ r.usuario_admin }}</td>
<td>{{ r.accion }}</td>
<td>{{ r.usuario_afectado }}</td>
<td>{{ r.detalle }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
